let LANG = 'en';                                        // default: English
try{ LANG = localStorage.getItem('simplytax-home-lang') || 'en'; }catch(e){}
function applyLang(){
  const d = I18N[LANG] || I18N.en;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v = d[el.getAttribute('data-i18n')];
    if(v!=null) el.innerHTML = v;
  });
  document.documentElement.lang = LANG;
  document.title = d.title;
  const md=document.getElementById('metaDesc'); if(md) md.setAttribute('content', d.meta);
  const b=document.getElementById('langBtn'); if(b) b.textContent = LANG==='en' ? 'DE' : 'EN';
}
function toggleLang(){
  LANG = LANG==='en' ? 'de' : 'en';
  try{ localStorage.setItem('simplytax-home-lang', LANG); }catch(e){}
  applyLang();
}
