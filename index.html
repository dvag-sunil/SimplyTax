<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimplyTax - Tax Filing Workspace</title>
<style>
 :root{
 --ink:#12283A; --ink-soft:#3C5468; --paper:#F6F8F7; --card:#FFFFFF;
 --line:#DFE7E4; --teal:#0E7C66; --teal-dark:#0A5D4D; --teal-soft:#E3F1EC;
 --amber:#D98A1F; --amber-soft:#FBF1DF; --red:#B4432F; --red-soft:#F9E9E5;
 --blue-soft:#E7EEF6; --radius:14px; --shadow:0 1px 2px rgba(18,40,58,.06),0 6px 18px rgba(18,40,58,.07);
 }
 *{box-sizing:border-box;margin:0;padding:0}
 html,body{height:100%}
 body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,'Helvetica Neue',sans-serif;background:var(--paper);color:var(--ink);font-size:15px;line-height:1.5}
 h1,h2,h3,.display{font-family:Georgia,'Times New Roman',serif;letter-spacing:-.01em}
 button{font:inherit;cursor:pointer;border:none;background:none}
 input,select,textarea{font:inherit;color:var(--ink)}
 .num{font-variant-numeric:tabular-nums}

 /* ---------- layout ---------- */
 .topbar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:10px 22px}
 .logo{display:flex;align-items:center;gap:10px;font-family:Georgia,serif;font-size:20px;font-weight:700;color:var(--ink)}
 .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-family:Georgia,serif}
 .topbar .spacer{flex:1}
 .lang-toggle{display:flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;background:var(--paper)}
 .lang-toggle button{padding:5px 14px;font-size:13px;font-weight:600;color:var(--ink-soft)}
 .lang-toggle button.on{background:var(--ink);color:#fff}
 .link-btn{color:var(--ink-soft);font-size:13.5px;font-weight:600;padding:6px 10px;border-radius:8px}
 .link-btn:hover{background:var(--paper)}
 main{max-width:1120px;margin:0 auto;padding:28px 22px 80px}

 /* ---------- buttons ---------- */
 .btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;transition:.15s}
 .btn-primary{background:var(--teal);color:#fff}
 .btn-primary:hover{background:var(--teal-dark)}
 .btn-ghost{border:1px solid var(--line);background:var(--card);color:var(--ink)}
 .btn-ghost:hover{border-color:var(--ink-soft)}
 .btn-amber{background:var(--ink);color:#fff}
 .btn-amber:hover{background:#1d3a52}
 .btn[disabled]{opacity:.5;cursor:not-allowed}
 .btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}

 /* ---------- login ---------- */
 .login-wrap{min-height:calc(100vh - 53px);display:flex;align-items:center;justify-content:center;padding:24px}
 .login-card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);width:400px;max-width:100%;padding:38px 36px}
 .login-card h1{font-size:26px;margin:14px 0 6px}
 .login-card p.sub{color:var(--ink-soft);font-size:14px;margin-bottom:24px}
 .field{margin-bottom:16px}
 .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
 .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;outline:none;transition:.15s}
 .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
 .field .hint{font-size:12px;color:var(--ink-soft);margin-top:4px}
 .demo-note{margin-top:18px;font-size:12.5px;color:var(--ink-soft);background:var(--paper);border:1px dashed var(--line);border-radius:10px;padding:10px 12px}
 .auth-tabs{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:16px 0 20px;background:var(--paper)}
 .auth-tabs button{flex:1;padding:9px;font-weight:600;font-size:13.5px;color:var(--ink-soft)}
 .auth-tabs button.on{background:var(--ink);color:#fff}
 .auth-err{background:var(--red-soft);border:1px solid #EBC6BD;color:var(--red);border-radius:10px;padding:9px 12px;font-size:13px;margin-bottom:14px}
 details.more{margin:10px 0;border:1px dashed var(--line);border-radius:10px;padding:10px 14px;background:#FBFCFB}
 details.more summary{cursor:pointer;font-weight:800;font-size:11.5px;color:var(--teal);text-transform:uppercase;letter-spacing:.07em;user-select:none}
 details.more[open] summary{margin-bottom:12px}
 .infobox{background:var(--blue-soft);border:1px solid #CBD9E8;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;line-height:1.5;clear:both}
 .infobox .ib-row{margin:4px 0}
 .info-btn{float:right;font-size:17px;color:var(--teal);padding:2px 8px;border-radius:8px}
 .info-btn:hover{background:var(--teal-soft)}
 .info-btn-sm{font-size:13px;color:var(--teal);background:var(--teal-soft);border:none;border-radius:50%;
 width:16px;height:16px;line-height:16px;display:inline-flex;align-items:center;justify-content:center;
 cursor:pointer;margin-left:5px;vertical-align:middle;padding:0}
 .info-btn-sm:hover{background:var(--teal)}
 .info-btn-sm:hover{color:#fff}

 /* ---------- dashboard ---------- */
 .page-head{display:flex;align-items:flex-end;gap:16px;margin-bottom:22px;flex-wrap:wrap}
 .page-head h1{font-size:28px}
 .page-head p{color:var(--ink-soft);font-size:14px}
 .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:26px}
 .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
 .stat .k{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
 .stat .v{font-family:Georgia,serif;font-size:28px;margin-top:4px}
 .stat .v.teal{color:var(--teal)}
 .toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
 .search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:0 12px}
 .search input{border:none;outline:none;padding:10px 0;flex:1;background:transparent}
 .filter-sel{border:1px solid var(--line);border-radius:10px;padding:9px 12px;background:var(--card)}

 .client-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
 .client-table th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);text-align:left;padding:12px 16px;border-bottom:1px solid var(--line);background:#FBFCFB}
 .client-table td{padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
 .client-table tr:last-child td{border-bottom:none}
 .client-table tbody tr{cursor:pointer;transition:.12s}
 .client-table tbody tr:hover{background:var(--teal-soft)}
 .avatar{width:34px;height:34px;border-radius:50%;background:var(--blue-soft);color:var(--ink);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-right:10px}
 .cname{font-weight:600}
 .csub{font-size:12.5px;color:var(--ink-soft)}
 .chip{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:3px 11px;font-size:12.5px;font-weight:600}
 .chip::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
 .chip.draft{background:var(--blue-soft);color:#3A5A7C}
 .chip.review{background:var(--amber-soft);color:var(--amber)}
 .chip.submitted{background:var(--teal-soft);color:var(--teal)}
 .refund-cell{font-weight:700}
 .refund-cell.pos{color:var(--teal)} .refund-cell.neg{color:var(--red)}
 .empty{padding:60px 20px;text-align:center;color:var(--ink-soft)}
 .empty .big{font-size:40px;margin-bottom:10px}

 /* ---------- workspace ---------- */
 .crumbs{font-size:13px;color:var(--ink-soft);margin-bottom:14px}
 .crumbs a{color:var(--teal);cursor:pointer;text-decoration:none;font-weight:600}
 .ws{display:grid;grid-template-columns:210px 1fr 260px;gap:20px;align-items:start}
 @media(max-width:980px){.ws{grid-template-columns:1fr}.steps{display:flex;overflow-x:auto;gap:6px}.step-item{white-space:nowrap}}
 .steps{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow)}
 .step-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.12s}
 .step-item:hover{background:var(--paper)}
 .step-item.on{background:var(--ink);color:#fff}
 .progress-bar-wrap{height:4px;background:var(--line);border-radius:2px;margin:0 0 18px;overflow:hidden}
 .progress-bar-fill{height:4px;background:var(--teal);border-radius:2px;transition:width .3s}
 .step-counter{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
 .step-item .n{width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:11.5px;flex:none}
 .step-item.done .n{background:var(--teal);border-color:var(--teal);color:#fff}
 .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 28px}
 .panel h2{font-size:21px;margin-bottom:4px}
 .panel .lead{color:var(--ink-soft);font-size:14px;margin-bottom:22px}
 .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
 .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 16px}
 @media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}}
 .section-label{font-size:12px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 12px;padding-top:16px;border-top:1px solid var(--line)}
 .section-label:first-of-type{margin-top:0;padding-top:0;border-top:none}
 .nav-row{display:flex;justify-content:space-between;margin-top:26px;padding-top:18px;border-top:1px solid var(--line)}
 .warn{background:var(--amber-soft);border:1px solid #F0D9AE;color:#7A5410;border-radius:10px;padding:10px 14px;font-size:13.5px;margin-top:14px}

 /* refund meter - signature element */
 .meter{background:linear-gradient(160deg,#12283A,#1B3A52);color:#fff;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);position:sticky;top:74px}
 .meter .k{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#9FC1B8}
 .meter .big{font-family:Georgia,serif;font-size:34px;margin:8px 0 2px;color:#7FD8BE}
 .meter .big.neg{color:#F2A78F}
 .meter .sub{font-size:12px;color:#B9CBD9}
 .meter hr{border:none;border-top:1px solid rgba(255,255,255,.14);margin:16px 0}
 .meter .row{display:flex;justify-content:space-between;font-size:12.5px;color:#D6E2EC;padding:3px 0}
 .meter .row b{color:#fff;font-weight:600}
 .meter .foot{margin-top:14px;font-size:11px;color:#8FA6B8;line-height:1.45}

 /* upload */
 .dropzone{border:2px dashed var(--line);border-radius:14px;padding:34px 20px;text-align:center;color:var(--ink-soft);background:#FBFCFB;transition:.15s;cursor:pointer}
 .dropzone:hover,.dropzone.drag{border-color:var(--teal);background:var(--teal-soft)}
 .dropzone .icon{font-size:34px;margin-bottom:8px}
 .dropzone b{color:var(--ink)}
 .scan-status{display:flex;align-items:center;gap:12px;background:var(--blue-soft);border-radius:10px;padding:12px 16px;margin-top:14px;font-size:14px}
 .spinner{width:18px;height:18px;border:2.5px solid #B9CBD9;border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;flex:none}
 @keyframes spin{to{transform:rotate(360deg)}}
 .extract-ok{background:var(--teal-soft);border:1px solid #BEE0D4;color:var(--teal-dark);border-radius:10px;padding:12px 16px;margin-top:14px;font-size:13.5px}
 .extract-err{background:var(--red-soft);border:1px solid #EBC6BD;color:var(--red);border-radius:10px;padding:12px 16px;margin-top:14px;font-size:13.5px}
 .ai-flag{display:inline-block;background:var(--amber-soft);color:var(--amber);font-size:10.5px;font-weight:800;border-radius:5px;padding:1px 6px;margin-left:6px;letter-spacing:.03em;vertical-align:middle}

 /* summary */
 .sum-group{border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
 .sum-group .head{display:flex;justify-content:space-between;align-items:center;background:#FBFCFB;padding:10px 16px;font-weight:700;font-size:14px;border-bottom:1px solid var(--line)}
 .sum-group .head .edit{color:var(--teal);font-size:12.5px;font-weight:700;cursor:pointer}
 .sum-row{display:flex;justify-content:space-between;gap:16px;padding:8px 16px;font-size:13.5px;border-bottom:1px solid #F0F4F2}
 .sum-row:last-child{border-bottom:none}
 .sum-row .l{color:var(--ink-soft)} .sum-row .r{font-weight:600;text-align:right}

 /* modal */
 .modal-bg{position:fixed;inset:0;background:rgba(18,40,58,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
 .modal{background:var(--card);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:480px;max-width:100%;max-height:90vh;overflow:auto;padding:30px}
 .modal h2{font-size:21px;margin-bottom:6px}
 .success-mark{width:58px;height:58px;border-radius:50%;background:var(--teal-soft);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
 .ticket{background:var(--paper);border:1px dashed var(--line);border-radius:10px;padding:12px 16px;font-family:ui-monospace,Consolas,monospace;font-size:14px;text-align:center;margin:14px 0;letter-spacing:.04em}
 .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:12px;padding:12px 22px;font-size:14px;font-weight:600;box-shadow:var(--shadow);z-index:200;animation:fadeup .3s}
 @keyframes fadeup{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
 .hidden{display:none!important}
</style>
</head>

<div id="app"></div>
<input type="file" id="fileInput" accept="image/*,application/pdf" class="hidden">
<input type="file" id="docInput" accept="image/*,application/pdf,.doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" multiple class="hidden">

<script>
/* =====================================================================
 SimplyTax - Phase 1 (admin-only)
 English default · German toggle · in-memory + persistent storage
===================================================================== */

/* =====================================================================
 BACKEND TOGGLE - set enabled:true and your API URL to use the PostgreSQL
 backend (see /backend). false = local/browser storage only (current mode).
===================================================================== */
const BACKEND = { enabled:true, baseUrl:'https://simplytax-api.onrender.com' }; // ← if your Render URL has a suffix (e.g. -xk2p), adjust it here
/* PAYMENT TOGGLE - Steuerfuchs model: preparation & calculation free, payment unlocks
 PDF download + ELSTER submission PER RETURN. Prototype simulates the payment;
 production connects Stripe Checkout via the backend (see production checklist). */
const PAYMENT = {
 enabled:false,
 provider:'simulated', // 'simulated' | 'stripe_link' (no backend needed) | 'stripe_backend' (with Supabase/API)
 paymentLink:'https://buy.stripe.com/REPLACE_ME', // for 'stripe_link': create in Stripe Dashboard -> Payment Links
 pricePerReturn:9.95, currency:'EUR'
};
const isPaid = c => !PAYMENT.enabled || (c && c.pay && c.pay.status==='paid');
function showPayModal(){
 const c=cur(); const slot=document.getElementById('modal-slot'); if(!c||!slot) return;
 slot.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)this.remove()"><div class="modal" style="text-align:center">
 <div class="success-mark" style="background:var(--amber-soft);color:var(--amber)">🔒</div>
 <h2>${t('pay_title')}</h2>
 <p style="color:var(--ink-soft);font-size:14px;margin:8px 0 14px">${t('pay_sub')}</p>
 <div class="ticket" style="font-family:Georgia,serif;font-size:24px;letter-spacing:0">${eur(PAYMENT.pricePerReturn)}</div>
 <p style="font-size:12px;color:var(--ink-soft);margin:10px 0 12px">${t('pay_sim_note')}</p>
 <div style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin-bottom:14px">
 <span>🔒 ${t('trust_enc')}</span><span>🇪🇺 ${t('trust_eu')}</span><span>✓ ${t('trust_gdpr')}</span>
 </div>
 <div style="display:flex;gap:10px;justify-content:center">
 <button class="btn btn-ghost" onclick="this.closest('.modal-bg').remove()">${t('cancel')}</button>
 <button class="btn btn-primary" onclick="payNow()">💳 ${t('pay_now')}</button>
 </div></div></div>`;
}
async function payNow(){
 const c=cur(); if(!c) return;
 /* Level B: full Checkout via backend + webhook (tamper-proof) */
 if(PAYMENT.provider==='stripe_backend' && BACKEND.enabled){
 try{ const r=await api('/api/payments/checkout','POST',{clientId:c.id}); location.href=r.url; }
 catch(e){ alert('Stripe: '+e.message); }
 return;
 }
 /* Level A: Stripe Payment Link - works without a backend (beta-grade unlock) */
 if(PAYMENT.provider==='stripe_link' && PAYMENT.paymentLink && !PAYMENT.paymentLink.includes('REPLACE_ME')){
 await kvSet('klarsteuer-pending-pay', c.id);
 location.href = PAYMENT.paymentLink + (PAYMENT.paymentLink.includes('?')?'&':'?')
 + 'client_reference_id=' + encodeURIComponent(c.id);
 return;
 }
 /* simulated (prototype) */
 c.pay={ status:'paid', paidAt:Date.now(), amount:PAYMENT.pricePerReturn,
 txId:'PAY-'+Math.random().toString(36).slice(2,8).toUpperCase() };
 c.updatedAt=Date.now(); scheduleSave();
 const m=document.querySelector('.modal-bg'); if(m) m.remove();
 render();
}
/* on return from Stripe (success_url contains ?session_id=...) */
async function handleStripeReturn(){
 let qs=null; try{ qs=new URLSearchParams(location.search); }catch(e){ return; }
 const sid=qs && qs.get('session_id'); if(!sid) return;
 try{
 if(PAYMENT.provider==='stripe_backend' && BACKEND.enabled){
 const r=await api('/api/payments/verify','POST',{sessionId:sid});
 const c=S.clients.find(x=>x.id===r.clientId);
 if(r.paid && c){ c.pay={status:'paid',paidAt:Date.now(),amount:PAYMENT.pricePerReturn,txId:sid.slice(0,24)}; scheduleSave(); }
 } else if(PAYMENT.provider==='stripe_link'){
 const pend=await kvGet('klarsteuer-pending-pay');
 const c=S.clients.find(x=>x.id===pend);
 if(c){ c.pay={status:'paid',paidAt:Date.now(),amount:PAYMENT.pricePerReturn,txId:sid.slice(0,24)}; scheduleSave(); }
 await kvDel('klarsteuer-pending-pay');
 }
 }catch(e){ console.error('stripe return:', e.message); }
 try{ history.replaceState({},'',location.pathname); }catch(e){}
}
let authToken = null;
async function api(path, method='GET', body){
 const r = await fetch(BACKEND.baseUrl+path, {
 method,
 headers:{ 'Content-Type':'application/json', ...(authToken?{Authorization:'Bearer '+authToken}:{}) },
 body: body?JSON.stringify(body):undefined });
 const data = await r.json().catch(()=>({}));
 if(!r.ok) throw new Error(data.error || ('HTTP '+r.status));
 return data;
}

/* ---------------- persistence & accounts (artifact storage with fallback) ---------------- */
const mem={};
/* storage layers: Claude artifact storage → browser localStorage (e.g. GitHub Pages) → in-memory */
async function kvGet(k){
 try{ if(window.storage){ const r=await window.storage.get(k); if(r && r.value!=null) return r.value; } }catch(e){}
 try{ const v=localStorage.getItem(k); if(v!=null) return v; }catch(e){}
 return mem[k]??null;
}
async function kvSet(k,v){
 try{ if(window.storage){ await window.storage.set(k,v); return; } }catch(e){}
 try{ localStorage.setItem(k,v); return; }catch(e){}
 mem[k]=v;
}
async function kvDel(k){
 try{ if(window.storage){ await window.storage.delete(k); } }catch(e){}
 try{ localStorage.removeItem(k); }catch(e){}
 delete mem[k];
}

async function saveState(){
 await kvSet('klarsteuer-prefs', JSON.stringify({lang:S.lang}));
 if(!S.user) return;
 if(BACKEND.enabled){
 try{ await api('/api/clients/bulk','PUT',{clients:S.clients}); }
 catch(e){ console.error('backend sync failed:', e.message); }
 return;
 }
 await kvSet('klarsteuer-data-'+S.user.id, JSON.stringify({clients:S.clients}));
}
async function loadUserData(){
 if(BACKEND.enabled){
 try{ const r=await api('/api/clients'); S.clients=(r.clients||[]).map(migrateClient); }
 catch(e){ console.error('backend load failed:', e.message); S.clients=[]; }
 return;
 }
 const v=await kvGet('klarsteuer-data-'+S.user.id);
 let cl=[]; if(v){ try{ cl=JSON.parse(v).clients||[]; }catch(e){} }
 S.clients=cl.map(migrateClient);
}
async function loadState(){
 const p=await kvGet('klarsteuer-prefs'); if(p){ try{ S.lang=JSON.parse(p).lang||'en'; }catch(e){} }
 if(BACKEND.enabled){
 const tok=await kvGet('klarsteuer-token');
 if(tok){ authToken=tok;
 try{ const r=await api('/api/auth/me'); S.user=r.user; await loadUserData(); S.loggedIn=true; S.view='dash'; }
 catch(e){ authToken=null; await kvDel('klarsteuer-token'); } }

async function hashPass(email,pass){
 try{
 const data=new TextEncoder().encode(email.toLowerCase()+'::'+pass);
 const buf=await crypto.subtle.digest('SHA-256',data);
 return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
 }catch(e){ return 'b64:'+btoa(unescape(encodeURIComponent(email.toLowerCase()+'::'+pass))); }
}

/* ---------------- number & format helpers ---------------- */
const N = v => {
 let s = String(v??'').trim().replace(/[€\s]/g,'');
 if(!s) return 0;
 const hasC = s.includes(','), hasD = s.includes('.');
 if(hasC && hasD){
 // last separator wins as decimal: "1.234,56" → German · "1,234.56" → English
 if(s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g,'').replace(',','.');
 else s = s.replace(/,/g,'');
 } else if(hasC){ s = s.replace(',','.'); } // "1234,56" → German decimal
 else if(hasD){
 const p = s.split('.');
 if(!(p.length===2 && p[1].length<=2 && p[1].length>0)) s = s.replace(/\./g,''); // "1.234" → thousands, "45000.5" → decimal
 }
 const n = parseFloat(s); return Number.isFinite(n)?n:0;
};
function formatDE(n){
 const hasFrac = Math.abs(n - Math.round(n)) > 0.004;
 return new Intl.NumberFormat('de-DE',{minimumFractionDigits:hasFrac?2:0,maximumFractionDigits:2}).format(n);
}
function eur(n){ return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Math.round(n)); }
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function dateStr(ts){ return new Date(ts).toLocaleDateString(S.lang==='de'?'de-DE':'en-GB'); }

/* ---------------- tax engine (§32a EStG, simplified estimate) ---------------- */
/* § 32a parameters per year; 2026 falls back to 2025 until the 2026 tariff is enacted */
const TARIFF = {
 2023:{gfb:10908, z1e:15999, a1:979.18, z2e:62809, a2:192.59, c2:966.53, z3e:277825, r3:.42, d3:9972.98, r4:.45, d4:18307.73},
 2024:{gfb:11784, z1e:17005, a1:954.80, z2e:66760, a2:181.19, c2:991.21, z3e:277825, r3:.42, d3:10636.31, r4:.45, d4:18971.06},
 2025:{gfb:12096, z1e:17443, a1:932.30, z2e:68480, a2:176.64, c2:1015.13, z3e:277825, r3:.42, d3:10911.92, r4:.45, d4:19246.67},
};
function estBase(zvE, year){
 const T = TARIFF[year] || TARIFF[2025]; const x = Math.floor(zvE);
 if(x <= T.gfb) return 0;
 if(x <= T.z1e){ const y=(x-T.gfb)/10000; return Math.floor((T.a1*y+1400)*y); }
 if(x <= T.z2e){ const z=(x-T.z1e)/10000; return Math.floor((T.a2*z+2397)*z+T.c2); }
 if(x <= T.z3e) return Math.floor(T.r3*x - T.d3);
 return Math.floor(T.r4*x - T.d4);
}
function incTotals(c){
 return (c.emps||[]).reduce((a,e)=>{
 a.gross+=N(e.gross);
 a.wageTax+=N(e.wageTax); a.soli+=N(e.soli); a.church+=N(e.churchPaid);
 a.paid+=N(e.wageTax)+N(e.soli)+N(e.churchPaid)+N(e.churchSpouse)+N(e.lst11)+N(e.soli12)+N(e.kist13)+N(e.kistSp14);
 a.kistSA+=N(e.churchPaid)+N(e.churchSpouse)+N(e.kist13)+N(e.kistSp14); // § 10 (1) Nr. 4: paid KiSt is a Sonderausgabe (not line 45)
 a.ersatz+=N(e.ersatz15); // Progressionsvorbehalt (line 15)
 const isB=e.person==='B';
 a[isB?'fahrtB':'fahrtA']+=N(e.fahrt17)+N(e.pausch18); // reduces Entfernungspauschale (lines 17/18), per person
 a.rv+=N(e.anRV)+N(e.anRVb); a.kv+=N(e.anKV); a.pv+=N(e.anPV); a[isB?'avB':'avA']+=N(e.anAV); a.pkv+=N(e.pkv28);
 a.agKV+=N(e.agKV); a.agPKV+=N(e.agPKV); a.agPV+=N(e.agPV); // tax-free employer subsidies (lines 24a/b/c) reduce the deductible amounts
 return a; },
 {gross:0,wageTax:0,soli:0,church:0,paid:0,kistSA:0,ersatz:0,fahrtA:0,fahrtB:0,rv:0,kv:0,pv:0,avA:0,avB:0,pkv:0,agKV:0,agPKV:0,agPV:0});
}
function computeEstimate(c){
 const year = c.taxYear || 2025;
 const inc = incTotals(c);
 const gross = inc.gross;
 const joint = c.p.marital==='married'; // true ONLY for actual Zusammenveranlagung (doubles GFB, SA-Pauschbetrag, Vorsorge caps, Soli-Freigrenze, etc.)
 // § 32a Abs. 6 Nr. 1 EStG - Witwensplitting/Gnadensplitting: in the ASSESSMENT YEAR
 // immediately following the spouse's death, the splitting TARIFF (rate schedule) still
 // applies to the surviving spouse's own income - but NONE of the other "joint" doublings
 // (no second income, no doubled allowances). Deliberately kept separate from `joint`.
 const widowSplitYear = c.p.marital==='verwitwet' && parseInt(c.p.deathYear||0)===year-1;
 const useSplitTariff = joint || widowSplitYear;
 // Werbungskosten per person: €1,230 lump sum each (if employed) OR actual costs, per person
 const calcWK = (w,fCredit)=>{ w=w||{};
 const days=Math.min(N(w.commuteDays),366), km=N(w.commuteKm);
 const near=Math.min(km,20), far=Math.max(km-20,0);
 const commute=Math.max(0, days*(near*0.30+far*0.38)-(fCredit||0));
 const ho=Math.min(N(w.homeOffice)*6,1260);
 const dhhRent=Math.min(N(w.dhhRent),1000)*Math.min(N(w.dhhMonths),12);
 const dKm=N(w.dhhKm), dNear=Math.min(dKm,20), dFar=Math.max(dKm-20,0);
 const dhhTrips=Math.min(N(w.dhhTrips),52)*(dNear*0.30+dFar*0.38);
 return commute+ho+N(w.equipment)+N(w.training)+N(w.other)+dhhRent+dhhTrips+N(w.relocation); };
 const employedB = joint && (c.emps||[]).some(x=>x.person==='B' && N(x.gross)>0);
 const employedA = (c.emps||[]).some(x=>N(x.gross)>0 && (!joint || x.person!=='B'));
 const itemsA = (c.wkItems||[]).filter(x=>!joint || x.person!=='B').reduce((a,x)=>a+N(x.amount),0);
 const itemsB = joint ? (c.wkItems||[]).filter(x=>x.person==='B').reduce((a,x)=>a+N(x.amount),0) : 0;
 const costsA = calcWK(c.wk, inc.fahrtA + (joint?0:inc.fahrtB)) + itemsA;
 const costsB = joint ? calcWK(c.wkB, inc.fahrtB) + itemsB : 0;
 const wk = (employedA ? Math.max(1230,costsA) : costsA)
 + (joint ? (employedB ? Math.max(1230,costsB) : costsB) : 0);
 // private insurances by tax category AND person (caps apply per person)
 const pins=(c.privIns||[]).reduce((a,x)=>{
 const net=Math.max(0, N(x.beitrag)-N(x.erstattung));
 const cat=INS_CAT[x.type]||'vorsorge';
 const per=(joint && x.person==='B')?'B':'A';
 a[per][cat]+=net; a.total+=net; return a;
 },{total:0,A:{basis:0,alters:0,riester:0,vorsorge:0,none:0},B:{basis:0,alters:0,riester:0,vorsorge:0,none:0}});
 // § 10 Abs. 1 Nr. 3/3a + Abs. 4 EStG, per person:
 // Basis (KV minus subsidy, ×0.96 Krankengeld cut; PV minus subsidy; PKV minus subsidy) is ALWAYS fully deductible.
 // The €1,900 cap (€2,800 without subsidized coverage) covers Basis + sonstige Vorsorge TOGETHER,
 // so sonstige (AV, Haftpflicht, BU...) only add anything while Basis < cap (§ 10 Abs. 4 S. 4).
 const svBasisPerson = per => (c.emps||[]).filter(e=>(e.person==='B')===(per==='B')).reduce((a,e)=>
 a + Math.max(0, N(e.anKV)-N(e.agKV))*0.96
 + Math.max(0, N(e.anPV)-N(e.agPV))
 + Math.max(0, N(e.pkv28)-N(e.agPKV)), 0);
 const basisA = svBasisPerson('A') + (joint?0:svBasisPerson('B')) + N(c.ins.kv)+N(c.ins.pv) + pins.A.basis;
 const basisB = joint ? (svBasisPerson('B') + pins.B.basis) : 0;
 const sonstA = inc.avA + (joint?0:inc.avB) + N(c.ins.av) + N(c.ins.other) + pins.A.vorsorge;
 const sonstB = joint ? (inc.avB + pins.B.vorsorge) : 0;
 const nr3A = Math.max(basisA, Math.min(basisA + sonstA, employedA ? 1900 : 2800));
 const nr3B = Math.max(basisB, Math.min(basisB + sonstB, employedB ? 1900 : 2800));
 const vors = inc.rv + N(c.ins.rv) /* Altersvorsorge: employee RV fully */
 + pins.A.alters + pins.B.alters
 + nr3A + nr3B;
 // Sonderausgaben incl. per-child childcare (2025: 80% max €4,800/child; before: 2/3 max €4,000) and school fees (30% max €5,000/child)
 const ccRate = year>=2025 ? {r:0.80,cap:4800} : {r:2/3,cap:4000};
 let childcare=0, school=0;
 const kidsArr = c.fam.children||[];
 if(kidsArr.length){
 for(const k of kidsArr){
 childcare += Math.min(N(k.childcare)*ccRate.r, ccRate.cap);
 school += Math.min(N(k.schoolFees)*0.30, 5000);
 }
 } else { /* legacy lump-sum fallback */
 const kidsN = Math.max(N(c.fam.kids),1);
 childcare = N(c.fam.childcare)>0 ? Math.min(N(c.fam.childcare)*ccRate.r, ccRate.cap*kidsN) : 0;
 school = Math.min(N(c.fam.schoolFees)*0.30, 5000);
 }
 const sa = Math.max(joint?72:36, N(c.sa.donations)+N(c.sa.other)) + childcare + school // § 10c Pauschbetrag 36/72
 + Math.min(pins.A.riester, 2100) + (joint ? Math.min(pins.B.riester, 2100) : 0)
 + Math.min(N(c.oth.realsplitting), 13805); // Realsplitting § 10 (1a) Nr. 1 (Anlage U)
 // § 33a support to needy relatives: capped at Grundfreibetrag × country-group factor (no zumutbare Belastung)
 const grpFactor = {1:1, 2:0.75, 3:0.5, 4:0.25}[c.fam.supportGroup] ?? 1;
 const support = Math.min(N(c.fam.support), (TARIFF[year]||TARIFF[2025]).gfb * grpFactor);
 // rental property (Anlage V): net result per property - losses reduce taxable income
 const propNet = (c.props||[]).reduce((a,p)=>a + (N(p.rent)-N(p.costs)), 0);
 // außergewöhnliche Belastung - zumutbare Belastung per § 33 Abs. 3 EStG, tier-wise (BFH VI R 75/14)
 const kidsN = (c.fam.children||[]).length;
 const gde = Math.max(0, gross + propNet - wk); // approximated Gesamtbetrag der Einkünfte
 const zPct = kidsN>=3 ? [0.01,0.01,0.02]
 : kidsN>=1 ? [0.02,0.03,0.04]
 : (joint ? [0.04,0.05,0.06] : [0.05,0.06,0.07]);
 let zumutbar = Math.min(gde,15340)*zPct[0];
 if(gde>15340) zumutbar += (Math.min(gde,51130)-15340)*zPct[1];
 if(gde>51130) zumutbar += (gde-51130)*zPct[2];
 // § 33b lump sums: count WITHOUT zumutbare Belastung
 const GDB={ '20':384,'30':620,'40':860,'50':1140,'60':1440,'70':1780,'80':2120,'90':2400,'100':2840,'blind':7400 };
 const disab = (GDB[c.oth.gdbA]||0) + (joint?(GDB[c.oth.gdbB]||0):0)
 + N(c.oth.fahrtA) + (joint?N(c.oth.fahrtB):0)
 + N(c.oth.pflegeA) + (joint?N(c.oth.pflegeB):0)
 + N(c.oth.kidTransfer);
 const agb = Math.max(0, N(c.ex.medical) - zumutbar) + support + disab;
 // § 24b Entlastungsbetrag für Alleinerziehende: 4,260 € + 240 € per further child
 const entl = (!joint && c.p.singleParent==='yes' && kidsN>=1) ? 4260 + 240*(kidsN-1) : 0;
 // § 24a Altersentlastungsbetrag: cohort-frozen percentage on wages (excl. Versorgungsbezüge)
 const aebFor = (birth, base) => {
 if(!birth || base<=0) return 0;
 const by=parseInt(String(birth).slice(0,4)); if(!by || by<1900 || by>year-15) return 0; // guard against invalid dates
 const first=by+65; if(first>year) return 0; // 64th year completed before the tax year
 let p; if(first<=2005) p=40;
 else if(first<=2020) p=40-1.6*(first-2005);
 else if(first<=2022) p=16-0.8*(first-2020);
 else p=14.4-0.4*(first-2022); // Wachstumschancengesetz melting 0.4pp/yr
 p=Math.max(0,p)/100; if(p<=0) return 0;
 return Math.min(Math.floor(base*p), Math.round(p*4750));
 };
 const wageBaseA=(c.emps||[]).reduce((a,x)=>a+(x.person==='B'?0:Math.max(0,N(x.gross)-N(x.vb8))),0);
 const wageBaseB=(c.emps||[]).reduce((a,x)=>a+(x.person==='B'?Math.max(0,N(x.gross)-N(x.vb8)):0),0);
 const aeb = aebFor(c.p.birthDate, wageBaseA) + (joint ? aebFor(c.p.spouseBirth, wageBaseB) : 0);
 // Anlage R: taxable share by start year (§ 22 incl. WtChG: 2005=50%, +2pp to 2020, +1pp to 2022, +0.5pp after)
 const rentePct = sy => { sy=parseInt(sy)||2005;
 if(sy<=2005) return 50; if(sy<=2020) return 50+2*(sy-2005);
 if(sy<=2022) return 80+(sy-2020); return Math.min(100, 82+0.5*(sy-2022)); };
 const renteAgg=(c.rente||[]).reduce((a,r)=>{ const amt=N(r.amount); if(amt<=0) return a;
 const pct = r.type==='privat' ? Math.min(100,Math.max(0,N(r.pct))) : rentePct(r.startYear);
 a.taxable += amt*pct/100; a.persons.add(r.person==='B'?'B':'A'); return a; },
 {taxable:0, persons:new Set()});
 const renteNet = Math.max(0, renteAgg.taxable - 102*renteAgg.persons.size); // WK-Pauschbetrag €102 p.p.
 // Anlage SO: private sales § 23 (Freigrenze: full amount taxable at/above the limit) + received support
 const soFG = year>=2024 ? 1000 : 600;
 const soTaxable = (N(c.oth.soGain) >= soFG ? N(c.oth.soGain) : 0) + N(c.oth.soUnterhalt);
 const zvE = Math.max(0, gross + propNet + soTaxable + renteNet - wk - vors - sa - inc.kistSA - agb - entl - aeb - N(c.oth.lossCarry)); // § 10d Verlustvortrag
 const tariffT = z => useSplitTariff ? 2*estBase(z/2, year) : estBase(z, year);
 // Progressionsvorbehalt § 32b: employer benefits (line 15) + further benefits (Elterngeld, Krankengeld, ALG I...)
 const ersatzTotal = inc.ersatz + N(c.oth.ersatz);
 const taxFor = z => (ersatzTotal>0 && z>0)
 ? Math.floor( tariffT(z + ersatzTotal) * (z / (z + ersatzTotal)) )
 : tariffT(z);
 let tax = taxFor(zvE);
 // Kinderfreibetrag-Günstigerprüfung § 31: allowance vs. Kindergeld - the better path wins
 const KFB = {2023:8952, 2024:9312, 2025:9600, 2026:9756};
 // § 31 S. 4: the statutory Kindergeld ENTITLEMENT is added back - independent of what was entered/received
 const KG_MONTH = {2023:250, 2024:250, 2025:255, 2026:259};
 const kgAnspruch = (KG_MONTH[year]||255) * 12 * kidsN;
 let kgHinzu = 0;
 if(kidsN>0){
 const taxKfb = taxFor(Math.max(0, zvE - (KFB[year]||9600)*kidsN));
 if(tax - taxKfb > kgAnspruch){ tax = taxKfb; kgHinzu = kgAnspruch; } // allowance wins -> entitlement added back
 }
 // §35a credits
 // § 35c energetic renovation: 7% / 7% / 6% of max €200,000, capped 14k/14k/12k per installment year
 const energPct = {'1':0.07,'2':0.07,'3':0.06}[c.oth.energStage]||0;
 const energCap = {'1':14000,'2':14000,'3':12000}[c.oth.energStage]||0;
 const energ = Math.min(Math.min(N(c.oth.energCost),200000)*energPct, energCap);
 const credit = Math.min(N(c.ex.household)*0.20, 4000) + Math.min(N(c.ex.handwerker)*0.20, 1200) + energ;
 const taxAfter = Math.max(0, tax - credit);
 // Soli: Freigrenze per year + Milderungszone 11.9% (§§ 3, 4 SolZG); Abgeltungsteuer keeps flat 5.5%
 const SOLI_FG = {2023:17543, 2024:18130, 2025:19950, 2026:19950};
 const freig = (SOLI_FG[year]||19950) * (joint?2:1);
 const soli = taxAfter<=freig ? 0 : Math.min(taxAfter*0.055, (taxAfter-freig)*0.119);
 // church tax: 8% BY/BW, 9% elsewhere - levied PER PERSON (half of the joint tax each)
 const kistRate = (c.p.bundesland==='Bayern'||c.p.bundesland==='Baden-Württemberg') ? 0.08 : 0.09;
 const membA = ['ev','rk','other'].includes(c.p.religion);
 const membB = ['ev','rk','other'].includes(c.p.spouseReligion);
 const kistFactor = joint ? ((membA?0.5:0)+(membB?0.5:0)) : (membA?1:0);
 const kist = taxAfter * kistRate * kistFactor;
 // capital gains (Anlage KAP): line 7 + lines 18/19 (net totals) − uncompensated losses (lines 12/13, loss certificate)
 const kapGains = (c.kap||[]).reduce((a,k)=>a + N(k.gains) + N(k.k7) + N(k.k18) + N(k.k19) - N(k.k12) - N(k.k13), 0);
 const kapPaid = (c.kap||[]).reduce((a,k)=>a + N(k.taxPaid)+N(k.soliPaid) + N(k.k43)+N(k.k44)+N(k.k45), 0);
 const sparer = joint ? 2000 : 1000;
 const kapTaxable = Math.max(0, kapGains - sparer);
 const kap = kapTaxable*0.25 * 1.055; // 25% KapESt + 5.5% Soli thereon
 const owed = taxAfter + kgHinzu + soli + kist + kap;
 const paid = inc.paid + kapPaid;
 // Mobilitätsprämie §§ 101 ff. EStG: cash payout for low incomes with commutes > 20 km
 const gfbY = ((TARIFF[year]||TARIFF[2025]).gfb) * (joint?2:1);
 const farEP = Math.min(N(c.wk.commuteDays),366)*Math.max(N(c.wk.commuteKm)-20,0)*0.38
 + (joint ? Math.min(N(c.wkB.commuteDays),366)*Math.max(N(c.wkB.commuteKm)-20,0)*0.38 : 0);
 const mob = (zvE < gfbY && farEP > 0) ? 0.14 * Math.min(farEP, gfbY - zvE) : 0;
 return { zvE, wk, tax, credit, taxAfter, soli, kist, kap, propNet, owed, paid, mob, refund: paid - owed + mob };
}

/* ---------------- render root ---------------- */
const app = document.getElementById('app');
function render(){
 let html = topbar();
 if(!S.loggedIn) html += loginView();
 else if(S.view==='dash') html += dashView();
 else if(S.view==='client') html += clientView();
 app.innerHTML = html;
 bindGlobal();
 /* Tab-navigation fix: every field commit triggers a full re-render (this app has no
 virtual-DOM diffing), which destroys the DOM node the browser was about to focus
 natively on Tab. Restore focus to whichever field was queued by the Tab handler. */
 if(pendingFocusKey){
 const target = app.querySelector(`[data-tabkey="${CSS.escape(pendingFocusKey)}"]`);
 if(target){ target.focus(); if(target.select) try{ target.select(); }catch(e){} }
 pendingFocusKey = null;
 }
}
/* Tab key across fields: intercept Tab/Shift+Tab on any tracked field, commit its value
 (via blur, same as clicking away), and queue the next/previous field to be focused
 once render() finishes rebuilding the DOM. */
let pendingFocusKey = null;
document.addEventListener('keydown', function(e){
 if(e.key !== 'Tab') return;
 const el = e.target;
 if(!el || !el.hasAttribute || !el.hasAttribute('data-tabkey')) return;
 const all = Array.from(document.querySelectorAll('[data-tabkey]')).filter(x=>!x.disabled && x.offsetParent!==null);
 const idx = all.indexOf(el);
 if(idx===-1) return;
 const nextIdx = e.shiftKey ? idx-1 : idx+1;
 if(nextIdx<0 || nextIdx>=all.length) return; // let the browser handle tabbing out of the form normally
 e.preventDefault();
 pendingFocusKey = all[nextIdx].getAttribute('data-tabkey');
 el.blur(); // commits the current value exactly as clicking away would; if it actually
 // changed, onchange fires synchronously -> render() consumes pendingFocusKey immediately
 /* Fallback for when the value did NOT change: onchange never fires, so render() never
 runs to consume pendingFocusKey. Without this, it would sit stale and steal focus on
 some later, unrelated render. By the time this runs, the synchronous path above (if it
 fired) has already cleared pendingFocusKey, so this is a safe no-op in the common case. */
 setTimeout(()=>{
 if(!pendingFocusKey) return;
 const target = document.querySelector(`[data-tabkey="${CSS.escape(pendingFocusKey)}"]`);
 if(target){ target.focus(); if(target.select) try{ target.select(); }catch(e){} }
 pendingFocusKey = null;
 }, 0);
}, true);

/* image compression: max 2200px edge, JPEG q0.85 - text on receipts stays sharp */
function readDataUrl(f){ return new Promise((res,rej)=>{ const r=new FileReader();
 r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('read')); r.readAsDataURL(f); }); }
function compressImage(file){
 return new Promise((resolve)=>{
 const url=URL.createObjectURL(file);
 const img=new Image();
 img.onload=async ()=>{
 URL.revokeObjectURL(url);
 try{
 const MAX=2200; let w=img.width,h=img.height;
 if(w>MAX||h>MAX){ const k=Math.min(MAX/w,MAX/h); w=Math.round(w*k); h=Math.round(h*k); }
 const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
 cv.getContext('2d').drawImage(img,0,0,w,h);
 const out=cv.toDataURL('image/jpeg',0.85);
 const orig=await readDataUrl(file);
 resolve(out.length < orig.length ? out : orig); // never make the file bigger
 }catch(e){ resolve(await readDataUrl(file).catch(()=>null)); }
 };
 img.onerror=async ()=>{ URL.revokeObjectURL(url); resolve(await readDataUrl(file).catch(()=>null)); };
 img.src=url;
 });
}

function docSection(sec){

 const rows = docs.map(d=>`<div class="sum-row">
 <span class="l">📎 ${esc(d.name)} <span class="csub">(${Math.max(1,Math.round(d.size/1024))} KB · ${dateStr(d.ts)})</span></span>
 <span class="r" style="white-space:nowrap">
 <button class="btn-sm link-btn" onclick="downloadDoc('${d.id}','${esc(d.name)}')">⬇ ${t('download')}</button>

 </div>`).join('');
 return `<div class="section-label">${t('docs_h')}</div>
 <p style="font-size:13px;color:var(--ink-soft);margin-bottom:10px">${t('docs_lead')}</p>

document.getElementById('docInput').addEventListener('change', async e=>{
 const files=[...e.target.files]; e.target.value='';
 const c=cur(); if(!c) return;
 const okType = f => {
 const t=(f.type||'').toLowerCase(), n=(f.name||'').toLowerCase();
 if(t.startsWith('image/')) return true;
 if(t==='application/pdf' || n.endsWith('.pdf')) return true;
 if(t==='application/msword' || t==='application/vnd.openxmlformats-officedocument.wordprocessingml.document'
 || n.endsWith('.doc') || n.endsWith('.docx')) return true;
 if(!t && /\.(jpe?g|png|gif|webp|heic)$/.test(n)) return true;
 return false;
 };
 for(const f of files){
 if(!okType(f)){ alert(t('doc_bad_type')); continue; }
 try{
 const dataUrl = (f.type||'').startsWith('image/') ? await compressImage(f) : await readDataUrl(f);
 if(!dataUrl){ continue; }
 const bytes = Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 0.75);
 if(bytes > 5*1024*1024){ alert(t('doc_too_big')); continue; } // 5 MB after compression (ELSTER-friendly)
 const id=uid();
 await storeDocData(id,dataUrl);
 (c.docs=c.docs||[]).push({id,name:f.name,size:bytes,section:S.docTarget||'fam',ts:Date.now()});
 }catch(err){ console.error(err); }
 }
 c.updatedAt=Date.now(); scheduleSave(); render();
});
async function downloadDoc(id,name){
 let d=await getDocData(id); if(!d) return;
 if(/^https?:/.test(d)){
 try{ const b=await (await fetch(d)).blob(); d=URL.createObjectURL(b); }
 catch(e){ window.open && window.open(d,'_blank'); return; }
 }
 const a=document.createElement('a'); a.href=d; a.download=name; document.body.appendChild(a); a.click(); a.remove();
 if(d.startsWith('blob:')) setTimeout(()=>URL.revokeObjectURL(d), 60000);
}
async function deleteDoc(id){
 const c=cur(); c.docs=(c.docs||[]).filter(x=>x.id!==id);
 await removeDocData(id); c.updatedAt=Date.now(); scheduleSave(); render();
}

function CF(kid,field,label,opts={}){
 const type=opts.type||'text';

 const tk=`child.${kid.id}.${field}`;
 if(opts.select){
 return `<div class="field"><label>${label}</label>
 <select data-tabkey="${tk}" onchange="updChild('${kid.id}','${field}',this.value)">
 ${opts.select.map(o=>`<option value="${o[0]}" ${(kid[field]||'')===o[0]?'selected':''}>${o[1]}</option>`).join('')}

 }
 return `<div class="field"><label>${label}</label>
 <input data-tabkey="${tk}" type="${type}" value="${type==='date'?(esc(kid[field])||dateMax()):esc(kid[field]||'')}" placeholder="${opts.ph||''}" ${opts.euro?'inputmode="decimal"':''} ${type==='date'?`min="1940-01-01" max="${dateMax()}"`:''}

}

function addInq(){ const c=cur(); (c.inq=c.inq||[]).push({id:uid(),ts:Date.now(),q:'',a:'',status:'open'}); c.updatedAt=Date.now(); scheduleSave(); render(); }
function updInq(id,f,v){ const c=cur(); const q=(c.inq||[]).find(x=>x.id===id); if(q){ q[f]=v; c.updatedAt=Date.now(); scheduleSave(); } }
function toggleInq(id){ const c=cur(); const q=(c.inq||[]).find(x=>x.id===id); if(q){ q.status=q.status==='open'?'answered':'open'; c.updatedAt=Date.now(); scheduleSave(); render(); } }
function sendInq(id){
 const c=cur(); const q=(c.inq||[]).find(x=>x.id===id); if(!q) return;
 if(!(q.a||'').trim()){ alert(t('err_fields')); return; }
 q.sentAt=Date.now(); q.ticket='FA-'+c.taxYear+'-'+Math.random().toString(36).slice(2,8).toUpperCase();
 q.status='answered'; c.updatedAt=Date.now(); scheduleSave(); render();
}
function delInq(id){ const c=cur(); c.inq=(c.inq||[]).filter(x=>x.id!==id); c.updatedAt=Date.now(); scheduleSave(); render(); }

async function ensureJsPDF(){
 if(window.jspdf && window.jspdf.jsPDF) return true;
 const load = src => new Promise(res=>{ const s=document.createElement('script');
 s.src=src; s.onload=()=>res(true); s.onerror=()=>res(false); document.head.appendChild(s); });
 if(await load('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js') && window.jspdf) return true;
 if(await load('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js') && window.jspdf) return true;
 return !!(window.jspdf && window.jspdf.jsPDF);
}

/* =====================================================================
 Deterministic extraction sanitizer - does NOT trust the AI output.
 The Bescheinigung prints EUR and Ct in two columns split by a vertical
 line; vision models sometimes concatenate them (4.533|75 -> "453375",
 i.e. exactly 100x the real value). German social-insurance lines have
 LEGAL contribution ceilings, so a 100x value is mathematically
 detectable and repairable in code - independent of the model.
===================================================================== */
function sanitizeExtraction(j){
 /* --- 1. kfb (Kinderfreibeträge) must never be a copy of taxClass --- */
 const tc = String(j.taxClass??'').trim();
 if(j.kfb!=null && String(j.kfb).trim()!==''){
 const kfRaw = String(j.kfb).trim();
 if(tc && kfRaw===tc){ j.kfb=''; } // the known misread: Steuerklasse copied into kfb
 else{
 const kn = parseFloat(kfRaw.replace(',','.'));
 // valid Kinderfreibeträge: 0-9.5 in steps of 0.5
 if(!Number.isFinite(kn) || kn<0 || kn>9.5 || Math.round(kn*2)!==kn*2) j.kfb='';
 }
 }
 if(tc && !/^[1-6]$/.test(tc)) j.taxClass=''; // taxClass must be a single digit 1-6

 /* --- 2. EUR|Ct concatenation repair via legal contribution ceilings --- */
 /* caps: generous upper bounds (2025 Beitragsbemessungsgrenzen + margin).
 Trigger only when the integer-only value exceeds cap*3 (order-of-magnitude
 error) AND value/100 fits under the cap - so a legitimately high value
 slightly above the cap is never touched. */
 const CAP = { agRV:12000, agRVb:26000, anRV:12000, anRVb:26000,
 agKV:8000, agPKV:8000, agPV:3000,
 anKV:8000, anPV:3000, anAV:2200, pkv28:16000,
 soli:6000, churchPaid:12000, churchSpouse:12000 };
 const intOnly = v => /^\d+$/.test(String(v??'').trim());
 Object.keys(CAP).forEach(k=>{
 const v = String(j[k]??'').trim(); if(!v || !intOnly(v)) return;
 const n = parseInt(v,10), cap = CAP[k];
 if(n > cap*3 && n/100 <= cap) j[k] = (n/100).toFixed(2);
 });

 /* --- 3. cross-field repairs for the uncapped big numbers --- */
 const parsed = v => { const m=String(v??'').trim().match(/^(\d+)(?:\.(\d{1,2}))?$/); return m?parseFloat(m[0]):NaN; };
 let g = parsed(j.gross), w = parsed(j.wageTax);
 // wage tax can never exceed gross - if it does and it's integer-only, it's concatenated
 if(Number.isFinite(g) && Number.isFinite(w) && w>g && intOnly(j.wageTax) && w/100<=g){ j.wageTax=(w/100).toFixed(2); w=w/100; }
 // gross plausibility vs pension contribution: anRV is ~9.3% of gross (ceiling-capped);
 // gross > anRV*30 implies an RV rate under 0.33% - impossible unless gross is concatenated
 const rv = parsed(j.anRV);
 if(Number.isFinite(g) && Number.isFinite(rv) && rv>100 && intOnly(j.gross) && g>rv*30 && g/100>=rv*5){ j.gross=(g/100).toFixed(2); }

 /* --- 3b. legal-equality restore: Zeile 22a = Zeile 23a for statutory pension --- */
 /* Employer and employee pay equal halves of gesetzliche Rentenversicherung (§ 168 SGB VI),
 so 22a and 23a always print the same amount for standard employees. Vision models sometimes
 drop one of the two identical values as a "duplicate" - restore it from the other side. */
 if(!String(j.agRV??'').trim() && String(j.anRV??'').trim()) j.agRV = j.anRV;
 if(!String(j.agRVb??'').trim() && String(j.anRVb??'').trim()) j.agRVb = j.anRVb;

 /* --- 4. smear guard: employer subsidies (24a/24b/24c) duplicated from employee lines --- */
 /* On employee forms lines 24a-c are almost always empty; the model sometimes copies the
 adjacent employee value (25/26/28) into them. An exact-to-the-cent duplicate is the signature. */
 if(j.agKV && j.anKV && String(j.agKV).trim()===String(j.anKV).trim()) j.agKV='';
 if(j.agPV && j.anPV && String(j.agPV).trim()===String(j.anPV).trim()) j.agPV='';
 if(j.agPKV && j.pkv28 && String(j.agPKV).trim()===String(j.pkv28).trim()) j.agPKV='';
 return j;
}

async function handleFile(file){
 S.scanState='scanning'; render();
 try{
 const b64 = await new Promise((res,rej)=>{ const r=new FileReader();
 r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(new Error('read')); r.readAsDataURL(file); });
 const isPdf = file.type==='application/pdf';
 const prompt = `You are reading a German "Ausdruck der elektronischen Lohnsteuerbescheinigung" (annual wage tax certificate). Your task is to extract specific field values and return ONLY a valid JSON object - no markdown, no explanation, nothing else.

CRITICAL - EUR/Ct COLUMN LAYOUT (the most common parsing error):
The form has TWO narrow columns on the right: "EUR" and "Ct" (cents), separated by a vertical line.
The EUR column contains the euros (e.g. 48.750) and the Ct column contains the cents (e.g. 03).
You MUST read these as a SINGLE decimal number: EUR,Ct - so 48.750 | 03 = 48750.03 NOT 4875003.
Return all monetary values as a number with a dot as decimal separator, e.g. 48750.03, 8136.00, 4533.75.
NEVER concatenate the EUR and Ct digits without a decimal point.
If the Ct column shows "00", still include it: 48750.00 not 48750.

CRITICAL - FIELD IDENTITY RULES: - taxClass: a SINGLE digit 1-6 from the "Steuerklasse/Faktor" box. This is NEVER a decimal, NEVER more than one digit. If you see "4" in that box, taxClass = "4". - kfb (Kinderfreibeträge): a separate field, usually printed as "0,0" or "2,0" or similar. It is physically BELOW or BESIDE the Steuerklasse box. It is NEVER the same value as taxClass. If the Steuerklasse is 4, kfb might be "0,0" - do NOT copy the "4" into kfb. - idnr: the EMPLOYEE's personal 11-digit Identifikationsnummer (printed near the employee's name/address). NEVER the employer's Steuernummer (which has slashes like "181/815/08155") or Betriebsnummer. Leave empty "" if uncertain. - agRV (Zeile 22a) vs anRV (Zeile 23a): these are DIFFERENT fields on adjacent rows. Zeile 22a says "Arbeitgeber-Anteil/-Zuschuss ... a) zur gesetzlichen Rentenversicherung". Zeile 23a says "Arbeitnehmer-Anteil ... a) zur gesetzlichen Rentenversicherung". Read the LINE NUMBER carefully - do not swap them. IMPORTANT: Zeile 22a and Zeile 23a usually contain the IDENTICAL amount (employer and employee pay equal halves by German law). This is NOT a reading error and NOT a duplicate - you MUST extract BOTH values even when they are exactly the same. Never leave one of them empty because the other already has the same number. - Similarly: agKV (Zeile 24a) ≠ anKV (Zeile 25). agPV (Zeile 24c) ≠ anPV (Zeile 26).

FIELD MAPPING - match each JSON key to the exact Zeile number printed on the form:
employer = employer name from "Anschrift des Arbeitgebers" block (text, not a number)
period = Zeile 1 Bescheinigungszeitraum (text, e.g. "01.04.-31.12.")
taxClass = Steuerklasse/Faktor box (single digit 1-6 only)
kfb = Zahl der Kinderfreibeträge (decimal like 0.0 or 2.0, separate from taxClass)
idnr = employee's 11-digit Identifikationsnummer only (no slashes)
birthDate = Geburtsdatum in YYYY-MM-DD format
gross = Zeile 3 Bruttoarbeitslohn einschl. Sachbezüge
wageTax = Zeile 4 Einbehaltene Lohnsteuer
soli = Zeile 5 Einbehaltener Solidaritätszuschlag
churchPaid = Zeile 6 Einbehaltene Kirchensteuer des Arbeitnehmers
churchSpouse = Zeile 7 Einbehaltene Kirchensteuer des Ehegatten
vb8 = Zeile 8 In 3. enthaltene Versorgungsbezüge
vb9 = Zeile 9 Versorgungsbezüge für mehrere Kalenderjahre
ml10 = Zeile 10 Arbeitslohn für mehrere Kalenderjahre / Abfindungen
lst11 = Zeile 11 (unbesetzt on most recent forms - leave "")
soli12 = Zeile 12 (unbesetzt on most recent forms - leave "")
kist13 = Zeile 13 (unbesetzt on most recent forms - leave "")
kistSp14 = Zeile 14 (unbesetzt on most recent forms - leave "")
ersatz15 = Zeile 15 Leistungen die dem Progressionsvorbehalt unterliegen (Kurzarbeitergeld etc.)
kug15a = Zeile 15a (Saison-)Kurzarbeitergeld in 15. enthalten
dba16 = Zeile 16 Steuerfreier Arbeitslohn nach DBA/Auslandstätigkeitserlass (a+b combined)
fahrt17 = Zeile 17 Steuerfreie AG-Leistungen auf Entfernungspauschale anzurechnen
pausch18 = Zeile 18 Pauschal mit 15% besteuerte AG-Leistungen Fahrten
entsch19 = Zeile 19 (unbesetzt on most recent forms - leave "")
verpf20 = Zeile 20 Steuerfreie Verpflegungszuschüsse bei Auswärtstätigkeit
dhh21 = Zeile 21 Steuerfreie AG-Leistungen bei doppelter Haushaltsführung
agRV = Zeile 22a Arbeitgeber-Anteil/-Zuschuss zur gesetzlichen Rentenversicherung
agRVb = Zeile 22b Arbeitgeber-Anteil/-Zuschuss an berufsständische Versorgungseinrichtung
anRV = Zeile 23a Arbeitnehmer-Anteil zur gesetzlichen Rentenversicherung
anRVb = Zeile 23b Arbeitnehmer-Anteil an berufsständische Versorgungseinrichtung
agKV = Zeile 24a Arbeitgeber-Zuschuss zur gesetzlichen Krankenversicherung
agPKV = Zeile 24b Arbeitgeber-Zuschuss zur privaten Kranken-/Pflegeversicherung
agPV = Zeile 24c Arbeitgeber-Zuschuss zur gesetzlichen Pflegeversicherung
anKV = Zeile 25 Arbeitnehmer-Beiträge zur gesetzlichen Krankenversicherung
anPV = Zeile 26 Arbeitnehmer-Beiträge zur gesetzlichen Pflegeversicherung
anAV = Zeile 27 Arbeitnehmer-Beiträge zur Arbeitslosenversicherung
pkv28 = Zeile 28 Private Kranken-/Pflege-Pflichtversicherung oder Mindestvorsorgepauschale
bmg29 = Zeile 29 Bemessungsgrundlage für den Versorgungsfreibetrag
vbJahr30 = Zeile 30 Jahr des Versorgungsbeginns (4-digit year)
vbMon31 = Zeile 31 Erster/letzter Monat der Versorgungsbezüge
sterbe32 = Zeile 32 Sterbegeld / Abfindung Versorgungsbezüge
fb34 = Zeile 34 Versorgungsfreibetrag

Return this exact JSON structure (use "" for any field not found or empty on the form):
{"employer":"","period":"","taxClass":"","kfb":"","idnr":"","birthDate":"","gross":"","wageTax":"","soli":"","churchPaid":"","churchSpouse":"","vb8":"","vb9":"","ml10":"","lst11":"","soli12":"","kist13":"","kistSp14":"","ersatz15":"","kug15a":"","dba16":"","fahrt17":"","pausch18":"","entsch19":"","verpf20":"","dhh21":"","agRV":"","agRVb":"","anRV":"","anRVb":"","agKV":"","agPKV":"","agPV":"","anKV":"","anPV":"","anAV":"","pkv28":"","bmg29":"","vbJahr30":"","vbMon31":"","sterbe32":"","fb34":""}`;
 if(!BACKEND.enabled) throw new Error('backend_disabled');
 const dataUrl = isPdf ? `data:application/pdf;base64,${b64}` : `data:${file.type||'image/jpeg'};base64,${b64}`;
 const resp = await fetch(BACKEND.baseUrl+'/api/extract-doc', {
 method:'POST',
 headers:{ 'Content-Type':'application/json', ...(authToken?{'Authorization':'Bearer '+authToken}:{}) },
 body: JSON.stringify({ dataUrl, prompt })
 });
 if(!resp.ok) throw new Error('extract_failed');
 const data = await resp.json();
 const text = (data.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('\n');
 const clean = text.replace(/```json|```/g,'').trim();
 const j = JSON.parse(clean);
 sanitizeExtraction(j); // deterministic repair of known model errors - never trusts raw AI output
 const c=cur();
 /* every upload creates a NEW income statement - existing entries are never overwritten */
 const emp={id:uid()};
 /* Parse a dot-decimal number from the AI (e.g. "50220.00") directly to German display format.
 N() is intentionally NOT used here: N("50220.00") treats the .00 as a decimal and returns
 50220 (whole number), then formatDE drops the ",00" - showing "50.220" instead of "50.220,00".
 We parse integer + decimal parts directly instead. */
 const aiNum = v => {
 const str = String(v).trim().replace(/[€\s]/g,'');
 if(!str || str==='0' || str==='0.00' || str==='0,00') return null;
 const m = str.match(/^(-?\d+)(?:\.(\d{1,2}))?$/); // dot-decimal from AI: 50220.00 or 50220
 if(m){
 const cents = (m[2]||'00').padEnd(2,'0');
 const intPart = m[1].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
 return intPart + ',' + cents;
 }
 // fallback: AI returned German format already ("50.220,00") - re-format explicitly with 2dp
 const num = N(str); if(num === 0) return null;
 return new Intl.NumberFormat('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}).format(num);
 };
 const TEXTF={employer:1,period:1,taxClass:1,kfb:1,vbJahr30:1,vbMon31:1};
 const EMPKEYS=['employer','period','taxClass','kfb','gross','wageTax','soli','churchPaid','churchSpouse',
 'vb8','vb9','ml10','lst11','soli12','kist13','kistSp14','ersatz15','kug15a','dba16','fahrt17','pausch18',
 'entsch19','verpf20','dhh21','agRV','agRVb','anRV','anRVb','agKV','agPKV','agPV','anKV','anPV','anAV',
 'pkv28','bmg29','vbJahr30','vbMon31','sterbe32','fb34'];
 EMPKEYS.forEach(k=>{
 const val=j[k]; if(val==null || String(val).trim()==='') return;
 if(TEXTF[k]){ emp[k]=String(val); }
 else { const cv=aiNum(val); if(!cv) return; emp[k]=cv; } // skip empty/zero values to keep the card clean
 S.aiFields['emps.'+emp.id+'.'+k]=true;
 });
 (c.emps=c.emps||[]).push(emp);
 /* person A/B detection via Identifikationsnummer (married couples) */
 emp.person='A';
 const idnrRaw=j.idnr?String(j.idnr).replace(/\s/g,''):'';
 const idnrClean=/^\d{11}$/.test(idnrRaw) ? idnrRaw : ''; // Identifikationsnummer is ALWAYS exactly 11 digits;
 // anything else (e.g. a Steuernummer like 181/815/08155) is silently rejected here
 const aId=(c.p.taxId||'').replace(/\s/g,''), bId=(c.p.spouseTaxId||'').replace(/\s/g,'');
 if(c.p.marital==='married' && idnrClean){
 if(bId && idnrClean===bId){ emp.person='B'; }
 else if(aId && idnrClean!==aId){
 emp.person='B';
 if(!bId){ c.p.spouseTaxId=idnrClean; S.aiFields['p.spouseTaxId']=true; }
 }
 }
 /* personal data: fill ONLY if still empty and the document belongs to person A; employer's Finanzamt is ignored */
 if(emp.person==='A'){
 if(idnrClean && !(c.p.taxId||'').trim()){ c.p.taxId=idnrClean; S.aiFields['p.taxId']=true; }
 if(j.birthDate && !(c.p.birthDate||'').trim()){
 let b=String(j.birthDate).trim();
 const dmy=b.match(/^(\d{2})\.(\d{2})\.(\d{4})$/); if(dmy) b=`${dmy[3]}-${dmy[2]}-${dmy[1]}`;
 if(/^\d{4}-\d{2}-\d{2}$/.test(b)){ c.p.birthDate=b; S.aiFields['p.birthDate']=true; }
 }
 }
 c.updatedAt=Date.now(); scheduleSave();
 S.scanState='ok';
 }catch(err){ console.error('extraction failed',err); S.scanState='err'; }
 render();
}

/* ---------------- boot ---------------- */
/* Paint an immediate loading screen before any network call - avoids the blank-page
 gap during backend auth/data fetch, especially on a cold-started free-tier server. */
(function(){
 /* password-reset deep link from the email */
 try{
 if(typeof location!=='undefined' && location.search){
 const q=new URLSearchParams(location.search);
 if(q.get('reset') && q.get('email')){
 S.resetToken=q.get('reset'); S.resetEmail=q.get('email'); S.authMode='reset';
 if(typeof history!=='undefined') history.replaceState({},'',location.pathname);
 }
 }
 }catch(e){}
 const langGuess = (()=>{ try{ return JSON.parse(localStorage.getItem('klarsteuer-prefs')||'{}').lang; }catch(e){ return null; } })() || 'en';
 const msg = STR[langGuess]?.loading || STR.en.loading;
 document.getElementById('app').innerHTML = `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--ink-soft)">
 <div style="width:34px;height:34px;border:3px solid var(--teal-soft);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite"></div>
 <div id="boot-msg" style="font-size:14px">${msg}</div>
 <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
 </div>`;
 const slowTimer = setTimeout(()=>{
 const el=document.getElementById('boot-msg');
 if(el) el.textContent = STR[langGuess]?.loading_slow || STR.en.loading_slow;
 }, 3000);
 (async()=>{
 try{ await loadState(); await handleStripeReturn(); }
 finally{ clearTimeout(slowTimer); render(); }
 })();
})();
</script>
